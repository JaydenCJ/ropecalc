<svg xmlns="http://www.w3.org/2000/svg" width="780" height="470" viewBox="0 0 780 470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="780" height="470" rx="10" fill="#0d1117"/>
  <rect width="780" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="390" y="21" fill="#8b949e" text-anchor="middle">ropecalc — stop cargo-culting your rope_scaling block</text>

  <text x="24" y="64" fill="#7ee787">$ ropecalc plan config.json --target 16k</text>

  <text x="24" y="94" fill="#c9d1d9" xml:space="preserve">rope      head_dim 128 · rotary 128 · base 10000 · trained ctx 4096 (4k)</text>
  <text x="24" y="114" fill="#c9d1d9" xml:space="preserve">target    16384 (16k) · factor <tspan fill="#79c0ff">4.00×</tspan></text>

  <text x="24" y="144" fill="#c9d1d9" xml:space="preserve">linear    factor 4.00 — every pair compressed alike, needs fine-tuning here</text>
  <text x="24" y="164" fill="#c9d1d9" xml:space="preserve">ntk       rope_theta 10000 → <tspan fill="#d2a8ff">40889.9</tspan> (= base × 4.00^(128/126))</text>
  <text x="24" y="184" fill="#c9d1d9" xml:space="preserve">yarn      factor 4.00 · beta 32/1 · ramp pairs <tspan fill="#d2a8ff">20…46</tspan> of 64 · mscale <tspan fill="#d2a8ff">1.14</tspan></text>
  <text x="24" y="204" fill="#8b949e" xml:space="preserve">          zones: 21 kept · 25 blended · 18 interpolated</text>

  <text x="24" y="234" fill="#c9d1d9" xml:space="preserve">recommend <tspan fill="#28c840">yarn</tspan> — 4.00× without fine-tuning is beyond what uniform tricks hold</text>

  <text x="24" y="266" fill="#7ee787">$ ropecalc plan config.json --target 16k --emit llamacpp</text>
  <text x="24" y="286" fill="#c9d1d9" xml:space="preserve">--ctx-size 16384 --rope-scaling yarn --rope-scale 4 --yarn-orig-ctx 4096</text>

  <text x="24" y="318" fill="#7ee787">$ ropecalc check downloaded-128k-model/config.json</text>
  <text x="24" y="338" fill="#c9d1d9" xml:space="preserve">  ok      factor 4 × original 32768 (32k) = declared max 131072 (128k)</text>
  <text x="24" y="358" fill="#c9d1d9" xml:space="preserve">  ok      ramp spans pairs 23…40 of 64: 24 kept · 16 blended · 24 interpolated</text>
  <text x="24" y="378" fill="#f0883e" xml:space="preserve">  warn    fork-specific keys present (mscale) — vanilla transformers ignores them silently</text>
  <text x="24" y="398" fill="#c9d1d9" xml:space="preserve">verdict   <tspan fill="#28c840">VALID</tspan> — 0 errors · 1 warning   (exit 0; INVALID exits 1)</text>

  <text x="24" y="430" fill="#8b949e" xml:space="preserve">linear · NTK-by-base · YaRN · dynamic · llama3 — exact math, offline, zero deps</text>
  <text x="24" y="448" fill="#8b949e" xml:space="preserve">per-dimension zones with `ropecalc dims` — see which pairs actually get interpolated</text>
</svg>
